<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOON Faucet</title>
  <style>
    body {
      background-color: #0d0d0d;
      color: #f5f5f5;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      max-width: 400px;
      background: #111;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
    }
    input, button {
      margin: 10px;
      padding: 10px;
      font-size: 1rem;
      border-radius: 6px;
      border: none;
    }
    input {
      width: 80%;
    }
    button {
      background: #ffcc00;
      cursor: pointer;
      color: #000;
      font-weight: bold;
    }
    .gift {
      margin-top: 20px;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 MOON Faucet</h1>
    <p>Enter your Lightning address, complete captcha, and claim your sats!</p>

    <input type="text" placeholder="cat@discoverlightning.org" id="linkInput" />

    <!-- Real hCaptcha widget -->
    <div class="h-captcha" data-sitekey="a7725132-7912-4624-a0fe-e614b40c1a7e"></div>
    <button id="verifyBtn">Verify Captcha</button>

    <button id="giftBtn" style="display:none;">Open Gift 🎁</button>
    <div class="gift" id="giftResult"></div>
  </div>

  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>

  <script>
    const verifyBtn = document.getElementById("verifyBtn");
    const giftBtn = document.getElementById("giftBtn");
    const giftResult = document.getElementById("giftResult");

    verifyBtn.onclick = () => {
      const token = hcaptcha.getResponse();

      if (!token) {
        alert("Please complete the captcha first");
        return;
      }

      verifyBtn.textContent = "Captcha Verified ✅";
      giftBtn.style.display = "inline-block";
    };

    giftBtn.onclick = () => {
      const gifts = ["🚀 Rocket", "🎡 Wheel", "🎁 Gift Box"];
      const sats = Math.floor(Math.random() * 50) + 1;
      const gift = gifts[Math.floor(Math.random() * gifts.length)];
      giftResult.textContent = `You opened a ${gift} and received ${sats} sats from MOON! 🌕`;
    };
  </script>
</body>
</html>
