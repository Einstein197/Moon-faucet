<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOON Faucet</title>
  <link rel="icon" type="image/png" href="moon.png">
  <style>
    body {
      background-color: #0d0d0d;
      background: linear-gradient(to bottom, #ff7b00, #3b0b5c);
      color: #f5f5f5;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start; /* 👈 FIXES THE TOP GAP */
      min-height: 100vh; /* 👈 allows natural scroll */
      margin: 0;
      padding: 0; /* 👈 removes hidden padding */
    }

    #MoonBanner {
      display: block;
      width: 100%;
      background: #000;
      border-radius: 12px;
      margin-bottom: 0; /* removes bottom gap under banner */
    }

    #MoonBanner img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
    }

    #frame {
      margin-top: 10px; /* removes top gap above ads */
      margin-bottom: 10px; /* keeps a small gap below ads */
      width: 100%;
      position: relative;
      z-index: 99998;
    }

    #frame iframe {
      border: 0;
      padding: 0;
      width: 70%;
      height: 60px;
      border-radius: 12px;
      overflow: hidden;
      display: block;
      margin: auto;
    }

    .container {
      text-align: center;
      max-width: 400px;
      background: #111;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
    }

    input, button {
      margin: 10px;
      padding: 10px;
      font-size: 1rem;
      border-radius: 6px;
      border: none;
    }

    input {
      width: 80%;
    }

    button {
      background: #ffcc00;
      cursor: pointer;
      color: #000;
      font-weight: bold;
    }

    .gift {
      margin-top: 20px;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

  <a href="https://kryptonlegend.fun" id="MoonBanner">
    <img src="banner.png" alt="Moon Faucet Banner">
  </a>

  <div id="frame">
    <iframe data-aa="2439609" src="//acceptable.a-ads.com/2439609/?size=Adaptive"></iframe>
  </div>

  <div class="container">
    <h1>🚀 MOON Faucet</h1>
    <p>Enter your Lightning address, complete captcha, and claim your sats!</p>

    <input type="text" placeholder="cat@discoverlightning.org" id="linkInput" />

    <!-- hCaptcha container -->
    <div id="captcha"></div>

    <button id="giftBtn" style="display:none;">Open Gift 🎁</button>
    <div class="gift" id="giftResult"></div>
  </div>

  <!-- Load hCaptcha with onload callback -->
  <script src="https://js.hcaptcha.com/1/api.js?onload=hcaptchaOnLoad" async defer></script>

  <script>
    const giftBtn = document.getElementById("giftBtn");
    const giftResult = document.getElementById("giftResult");

    // Called when captcha is solved
    function onCaptchaSuccess() {
      giftBtn.style.display = "inline-block";
    }

    // Called when hCaptcha script finishes loading
    window.hcaptchaOnLoad = function () {
      hcaptcha.render("captcha", {
        sitekey: "a7725132-7912-4624-a0fe-e614b40c1a7e",
        callback: onCaptchaSuccess
      });
    };

    giftBtn.onclick = async () => {
      const gifts = ["🚀 Rocket", "🎡 Wheel", "🎁 Gift Box"];

      // 1. Get address
      const address = document.getElementById("linkInput").value.trim();

      // 2. Check if empty
      if (!address) {
        giftResult.textContent = "⚠️ Please enter a Lightning address before claiming.";
        return;
      }

      // 3. Check format
      if (!address.includes("@")) {
        giftResult.textContent = "⚠️ Invalid Lightning address format.";
        return;
      }

      const [name, domain] = address.split("@");

      // 4. Check if Lightning address exists (via Worker)
      try {
        const verifyUrl = `https://ln-verify.shadowlegendcg.workers.dev?name=${name}&domain=${domain}`;
        const check = await fetch(verifyUrl).then(r => r.json());

        if (!check.valid) {
          giftResult.textContent = "⚠️ Lightning address not found. Please check spelling.";
          return;
        }
      } catch {
        giftResult.textContent = "⚠️ Could not verify Lightning address.";
        return;
      }


      // 5. If valid → roll reward
      const roll = Math.random();
      let sats = 0;
      let tier = ""; // 👈 store the tier name

      if (roll < 0.70) {
        sats = Math.floor(Math.random() * 10) + 1;
        tier = "a Common";

      } else if (roll < 0.90) {
        sats = Math.floor(Math.random() * 15) + 11;
        tier = "an Uncommon";

      } else if (roll < 0.97) {
        sats = Math.floor(Math.random() * 15) + 26;
        tier = "a Rare";

      } else if (roll < 0.995) {
        sats = Math.floor(Math.random() * 9) + 41;
        tier = "an Epic";

      } else {
        sats = 50;
        tier = "a Legendary Jackpot";
      }

      const gift = gifts[Math.floor(Math.random() * gifts.length)];

      giftResult.textContent =
        `You opened ${tier} ${gift} and received ${sats} sats from MOON! 🌕`;
    };

  </script>

</body>
</html>
