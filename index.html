<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOON Faucet</title>
  <link rel="icon" type="image/png" href="moon.png">

  <style>
    body {
      background: linear-gradient(to bottom, #ff7b00, #3b0b5c);
      color: #f5f5f5;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    #MoonBanner img {
      width: 100%;
      border-radius: 12px;
    }

    .container {
      text-align: center;
      max-width: 400px;
      background: #111;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
    }

    input, button {
      margin: 10px;
      padding: 10px;
      font-size: 1rem;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #ffcc00;
      cursor: pointer;
      color: #000;
      font-weight: bold;
    }

    /* WHEEL CONTAINER */
    #wheelContainer {
      margin: 20px auto;
      width: 260px;
      height: 260px;
      position: relative;
    }

    /* POINTER */
    #wheelPointer {
      content: "";
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2rem;
      color: #ffcc00;
      z-index: 10;
    }

    /* CANVAS WHEEL */
    #wheelCanvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 6px solid #fff;
      background: #222;
      transition: transform 4s cubic-bezier(.17,.67,.12,1.02);
    }

    /* Shake animation */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    /* Fade-in */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

  </style>
</head>
<body>

  <a href="https://kryptonlegend.fun" id="MoonBanner">
    <img src="banner.png" alt="Moon Faucet Banner">
  </a>

  <div class="container">
    <h1>🚀 MOON Faucet</h1>
    <p>Enter your Lightning address, complete captcha, and claim your sats!</p>

    <input type="text" placeholder="cat@discoverlightning.org" id="linkInput" />

    <div id="captcha"></div>

    <button id="giftBtn" style="display:none;">Open Gift 🎁</button>

    <!-- REAL NUMBERED WHEEL -->
    <div id="wheelContainer">
      <div id="wheelPointer">▼</div>
      <canvas id="wheelCanvas" width="260" height="260"></canvas>
    </div>

    <div id="giftAnimation" style="font-size: 3rem; height: 60px;"></div>
    <div class="gift" id="giftResult"></div>
  </div>

  <script src="https://js.hcaptcha.com/1/api.js?onload=hcaptchaOnLoad" async defer></script>

  <script>
    const giftBtn = document.getElementById("giftBtn");
    const giftResult = document.getElementById("giftResult");
    const wheelCanvas = document.getElementById("wheelCanvas");
    const ctx = wheelCanvas.getContext("2d");

    /* ---------------- DRAW 1–50 WHEEL ---------------- */
    function drawWheel() {
      const slices = 50;
      const angle = (2 * Math.PI) / slices;

      for (let i = 0; i < slices; i++) {
        ctx.beginPath();
        ctx.moveTo(130, 130);
        ctx.arc(130, 130, 130, i * angle, (i + 1) * angle);

        ctx.fillStyle = i % 2 === 0 ? "#ffcc00" : "#ff8800";
        ctx.fill();

        ctx.save();
        ctx.translate(130, 130);
        ctx.rotate(i * angle + angle / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "#000";
        ctx.font = "bold 14px Arial";
        ctx.fillText(i + 1, 120, 5);
        ctx.restore();
      }
    }

    drawWheel();

    /* ---------------- CAPTCHA ---------------- */
    function onCaptchaSuccess() {
      giftBtn.style.display = "inline-block";
    }

    window.hcaptchaOnLoad = function () {
      hcaptcha.render("captcha", {
        sitekey: "a7725132-7912-4624-a0fe-e614b40c1a7e",
        callback: onCaptchaSuccess
      });
    };

    /* ---------------- MAIN CLICK ---------------- */
    giftBtn.onclick = async () => {
      const giftAnimation = document.getElementById("giftAnimation");
      const address = document.getElementById("linkInput").value.trim();

      if (!address.includes("@")) {
        giftResult.textContent = "⚠️ Invalid Lightning address.";
        return;
      }

      const [name, domain] = address.split("@");

      try {
        const verifyUrl = `https://ln-verify.shadowlegendcg.workers.dev?name=${name}&domain=${domain}`;
        const check = await fetch(verifyUrl).then(r => r.json());
        if (!check.valid) {
          giftResult.textContent = "⚠️ Lightning address not found.";
          return;
        }
      } catch {
        giftResult.textContent = "⚠️ Could not verify Lightning address.";
        return;
      }

      /* ---------------- SPIN THE WHEEL ---------------- */
      const slices = 50;
      const sliceAngle = 360 / slices;

      // Pick a random number 1–50
      const resultNumber = Math.floor(Math.random() * 50) + 1;

      // Calculate final angle
      const extraSpins = 5 * 360;
      const stopAngle = extraSpins + (360 - (resultNumber - 1) * sliceAngle);

      wheelCanvas.style.transform = `rotate(${stopAngle}deg)`;

      await new Promise(res => setTimeout(res, 4000));

      /* ---------------- GIFT ANIMATION ---------------- */
      giftAnimation.innerHTML = "🎁";
      giftAnimation.style.animation = "shake 0.6s";

      await new Promise(res => setTimeout(res, 600));

      giftAnimation.innerHTML = "🎉";
      giftAnimation.style.animation = "fadeIn 0.5s";

      giftResult.innerHTML =
        `You spun the wheel and landed on <b>${resultNumber}</b>!  
         You received <b>${resultNumber}</b> sats from MOON! 🌕`;
      giftResult.style.animation = "fadeIn 0.5s";
    };
  </script>

</body>
</html>
