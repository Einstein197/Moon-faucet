<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOON Faucet</title>
  <link rel="icon" type="image/png" href="moon.png">

  <style>
    body {
      background: linear-gradient(to bottom, #ff7b00, #3b0b5c);
      color: #f5f5f5;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    #MoonBanner img {
      width: 100%;
      border-radius: 12px;
    }

    .container {
      text-align: center;
      max-width: 400px;
      background: #111;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
    }

    input, button {
      margin: 10px;
      padding: 10px;
      font-size: 1rem;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #ffcc00;
      cursor: pointer;
      color: #000;
      font-weight: bold;
    }

    /* REAL SPINNING WHEEL */
    #spinWheelContainer {
      margin: 20px auto;
      width: 240px;
      height: 240px;
      position: relative;
    }

    #spinWheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 6px solid #fff;
      background: conic-gradient(
        #ffcc00 0deg 36deg,
        #ff8800 36deg 72deg,
        #ffcc00 72deg 108deg,
        #ff8800 108deg 144deg,
        #ffcc00 144deg 180deg,
        #ff8800 180deg 216deg,
        #ffcc00 216deg 252deg,
        #ff8800 252deg 288deg,
        #ffcc00 288deg 324deg,
        #ff8800 324deg 360deg
      );
      transition: transform 3s cubic-bezier(.17,.67,.12,1.02);
      position: relative;
    }

    #spinWheel::after {
      content: "▼";
      position: absolute;
      top: -32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2rem;
      color: #ffcc00;
    }

    /* Shake animation */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    /* Fade-in */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Tier colors */
    .common { color: #bfbfbf; }
    .uncommon { color: #4caf50; }
    .rare { color: #2196f3; }
    .epic { color: #9c27b0; }
    .legendary { color: #ff9800; font-weight: bold; text-shadow: 0 0 10px #ff9800; }

  </style>
</head>
<body>

  <a href="https://kryptonlegend.fun" id="MoonBanner">
    <img src="banner.png" alt="Moon Faucet Banner">
  </a>

  <div class="container">
    <h1>🚀 MOON Faucet</h1>
    <p>Enter your Lightning address, complete captcha, and claim your sats!</p>

    <input type="text" placeholder="cat@discoverlightning.org" id="linkInput" />

    <div id="captcha"></div>

    <button id="giftBtn" style="display:none;">Open Gift 🎁</button>

    <!-- REAL SPINNING WHEEL -->
    <div id="spinWheelContainer">
      <div id="spinWheel"></div>
    </div>

    <div id="giftAnimation" style="font-size: 3rem; height: 60px;"></div>
    <div class="gift" id="giftResult"></div>
  </div>

  <script src="https://js.hcaptcha.com/1/api.js?onload=hcaptchaOnLoad" async defer></script>

  <script>
    const giftBtn = document.getElementById("giftBtn");
    const giftResult = document.getElementById("giftResult");

    function onCaptchaSuccess() {
      giftBtn.style.display = "inline-block";
    }

    window.hcaptchaOnLoad = function () {
      hcaptcha.render("captcha", {
        sitekey: "a7725132-7912-4624-a0fe-e614b40c1a7e",
        callback: onCaptchaSuccess
      });
    };

    giftBtn.onclick = async () => {
      const gifts = ["🚀 Rocket", "🎡 Wheel", "🎁 Gift Box"];
      const wheel = document.getElementById("spinWheel");
      const giftAnimation = document.getElementById("giftAnimation");

      const address = document.getElementById("linkInput").value.trim();

      if (!address) {
        giftResult.textContent = "⚠️ Please enter a Lightning address before claiming.";
        return;
      }

      if (!address.includes("@")) {
        giftResult.textContent = "⚠️ Invalid Lightning address format.";
        return;
      }

      const [name, domain] = address.split("@");

      try {
        const verifyUrl = `https://ln-verify.shadowlegendcg.workers.dev?name=${name}&domain=${domain}`;
        const check = await fetch(verifyUrl).then(r => r.json());
        if (!check.valid) {
          giftResult.textContent = "⚠️ Lightning address not found.";
          return;
        }
      } catch {
        giftResult.textContent = "⚠️ Could not verify Lightning address.";
        return;
      }

      giftResult.textContent = "";
      giftAnimation.innerHTML = "";

      // Roll reward
      const roll = Math.random();
      let sats = 0;
      let tier = "";
      let tierClass = "";
      let segment = 0;

      if (roll < 0.70) {
        sats = Math.floor(Math.random() * 10) + 1;
        tier = "a Common";
        tierClass = "common";
        segment = 0;
      } else if (roll < 0.90) {
        sats = Math.floor(Math.random() * 15) + 11;
        tier = "an Uncommon";
        tierClass = "uncommon";
        segment = 3;
      } else if (roll < 0.97) {
        sats = Math.floor(Math.random() * 15) + 26;
        tier = "a Rare";
        tierClass = "rare";
        segment = 6;
      } else if (roll < 0.995) {
        sats = Math.floor(Math.random() * 9) + 41;
        tier = "an Epic";
        tierClass = "epic";
        segment = 8;
      } else {
        sats = 50;
        tier = "a Legendary Jackpot";
        tierClass = "legendary";
        segment = 9;
      }

      // Spin wheel
      const extraSpins = Math.floor(Math.random() * 3) + 3;
      const stopAngle = (360 - segment * 36) + (extraSpins * 360);

      wheel.style.transform = `rotate(${stopAngle}deg)`;

      await new Promise(res => setTimeout(res, 3000));

      // Gift animation
      giftAnimation.innerHTML = "🎁";
      giftAnimation.style.animation = "shake 0.6s";

      await new Promise(res => setTimeout(res, 600));

      const gift = gifts[Math.floor(Math.random() * gifts.length)];

      giftAnimation.innerHTML = gift;
      giftAnimation.style.animation = "fadeIn 0.5s";

      giftResult.innerHTML =
        `<span class="${tierClass}">You opened ${tier} ${gift}</span> and received <b>${sats}</b> sats from MOON! 🌕`;
      giftResult.style.animation = "fadeIn 0.5s";
    };
  </script>

</body>
</html>
