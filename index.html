<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOON Faucet</title>
  <link rel="icon" type="image/png" href="moon.png">

  <style>
    body {
      background: linear-gradient(to bottom, #ff7b00, #3b0b5c);
      color: #f5f5f5;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    #MoonBanner img {
      width: 100%;
      border-radius: 12px;
    }

    .container {
      text-align: center;
      max-width: 400px;
      background: #111;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
    }

    input, button {
      margin: 10px;
      padding: 10px;
      font-size: 1rem;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #ffcc00;
      cursor: pointer;
      color: #000;
      font-weight: bold;
    }

    #wheelContainer {
      margin: 20px auto;
      width: 260px;
      height: 260px;
      position: relative;
    }

    #wheelPointer {
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2rem;
      color: #ffcc00;
      z-index: 10;
    }

    #wheelCanvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 6px solid #fff;
      background: #222;
      transition: transform 4s cubic-bezier(.17,.67,.12,1.02);
      transform-origin: 50% 50%;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <a href="https://kryptonlegend.fun" id="MoonBanner">
    <img src="banner.png" alt="Moon Faucet Banner">
  </a>

  <div class="container">
    <h1>🚀 MOON Faucet</h1>
    <p>Enter your Lightning address, complete captcha, and claim your sats!</p>

    <input type="text" placeholder="cat@discoverlightning.org" id="linkInput" />

    <div id="captcha"></div>

    <button id="giftBtn" style="display:none;">Open Gift 🎁</button>

    <div id="wheelContainer">
      <div id="wheelPointer">▼</div>
      <canvas id="wheelCanvas" width="260" height="260"></canvas>
    </div>

    <div id="giftAnimation" style="font-size: 3rem; height: 60px;"></div>
    <div class="gift" id="giftResult"></div>
  </div>

  <script src="https://js.hcaptcha.com/1/api.js?onload=hcaptchaOnLoad" async defer></script>

  <script>
    const giftBtn = document.getElementById("giftBtn");
    const giftResult = document.getElementById("giftResult");
    const wheelCanvas = document.getElementById("wheelCanvas");
    const ctx = wheelCanvas.getContext("2d");

    const SLICES = 50;
    const SLICE_ANGLE_DEG = 360 / SLICES;
    const CENTER_X = 130;
    const CENTER_Y = 130;
    const RADIUS = 130;

    // Draw wheel: slice 1 centered at top
    function drawWheel() {
      const angle = (2 * Math.PI) / SLICES;
      ctx.clearRect(0, 0, wheelCanvas.width, wheelCanvas.height);
      ctx.save();
      ctx.translate(CENTER_X, CENTER_Y);

      for (let i = 0; i < SLICES; i++) {
        const start = i * angle - Math.PI / 2;
        const end = (i + 1) * angle - Math.PI / 2;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, RADIUS, start, end);
        ctx.fillStyle = i % 2 === 0 ? "#ffcc00" : "#ff8800";
        ctx.fill();

        const mid = (start + end) / 2;
        ctx.save();
        ctx.rotate(mid);
        ctx.textAlign = "right";
        ctx.fillStyle = "#000";
        ctx.font = "bold 14px Arial";
        ctx.fillText(i + 1, RADIUS - 10, 5);
        ctx.restore();
      }

      ctx.restore();
    }

    drawWheel();

    function onCaptchaSuccess() {
      giftBtn.style.display = "inline-block";
    }

    window.hcaptchaOnLoad = function () {
      hcaptcha.render("captcha", {
        sitekey: "a7725132-7912-4624-a0fe-e614b40c1a7e",
        callback: onCaptchaSuccess
      });
    };

    giftBtn.onclick = async () => {
      const giftAnimation = document.getElementById("giftAnimation");
      const address = document.getElementById("linkInput").value.trim();

      if (!address.includes("@")) {
        giftResult.textContent = "⚠️ Invalid Lightning address.";
        return;
      }

      const [name, domain] = address.split("@");

      try {
        const verifyUrl = `https://ln-verify.shadowlegendcg.workers.dev?name=${name}&domain=${domain}`;
        const check = await fetch(verifyUrl).then(r => r.json());
        if (!check.valid) {
          giftResult.textContent = "⚠️ Lightning address not found.";
          return;
        }
      } catch {
        giftResult.textContent = "⚠️ Could not verify Lightning address.";
        return;
      }

      giftResult.textContent = "";
      giftAnimation.innerHTML = "";

      // Random target slice index (0–49)
      const targetIndex = Math.floor(Math.random() * SLICES);

      // Extra spins for drama
      const extraSpins = 5 * 360;

      // Slice 0 is centered at top when rotation = 0.
      // To bring slice N to top, rotate wheel by -N * SLICE_ANGLE_DEG.
      const stopAngle = extraSpins - targetIndex * SLICE_ANGLE_DEG;

      wheelCanvas.style.transform = `rotate(${stopAngle}deg)`;

      await new Promise(res => setTimeout(res, 4000));

      // Normalize final angle and compute winning index from angle
      const finalRotation = stopAngle % 360;
      const normalized = (360 - (finalRotation + 360) % 360) % 360; // angle at pointer
      const winningIndex = Math.floor(normalized / SLICE_ANGLE_DEG) % SLICES;
      const resultNumber = winningIndex + 1;

      giftAnimation.innerHTML = "🎁";
      giftAnimation.style.animation = "shake 0.6s";

      await new Promise(res => setTimeout(res, 600));

      giftAnimation.innerHTML = "🎉";
      giftAnimation.style.animation = "fadeIn 0.5s";

      giftResult.innerHTML =
        `You spun the wheel and landed on <b>${resultNumber}</b>!  
         You received <b>${resultNumber}</b> sats from MOON! 🌕`;
      giftResult.style.animation = "fadeIn 0.5s";
    };
  </script>

</body>
</html>
