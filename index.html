<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOON Faucet</title>
  <link rel="icon" type="image/png" href="moon.png">

  <style>

    html, body {
      overflow: hidden;
      height: 100%;
    }



    body {
      background: linear-gradient(to bottom, #ff7b00, #3b0b5c);
      color: #f5f5f5;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    #MoonBanner img {
      width: 100%;
      border-radius: 12px;
    }

    #frame {
      margin-top: 10px;
      margin-bottom: 10px;
      width: 100%;
      position: relative;
      z-index: 99998;
    }

    #frame iframe {
      border: 0;
      padding: 0;
      width: 70%;
      height: 60px;
      border-radius: 12px;
      overflow: hidden;
      display: block;
      margin: auto;
    }

    #mainWrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .container {
      text-align: center;
      max-width: 450px;
      background: #111;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
    }

    input, button {
      margin: 10px;
      padding: 10px;
      font-size: 1rem;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #ffcc00;
      cursor: pointer;
      color: #000;
      font-weight: bold;
    }

    #wheelContainer {
      display: none;
      width: 400px;
      height: 400px;
      position: relative;
    }

    #wheelPointer {
      position: absolute;
      top: -35px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3rem;
      color: #ffcc00;
      z-index: 10;
    }

    #wheelCanvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 6px solid #fff;
      background: #222;
      transition: transform 10s cubic-bezier(.12,.45,.15,1);
      transform-origin: 50% 50%;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <a href="https://kryptonlegend.fun" id="MoonBanner">
    <img src="banner.png" alt="Moon Faucet Banner">
  </a>

  <div id="frame">
    <iframe data-aa="2436395" src="//acceptable.a-ads.com/2436395/?size=Adaptive"></iframe>
  </div>

  <div id="mainWrapper">
    <div class="container">
      <h1>🚀 MOON Faucet</h1>
      <p>Enter your Lightning address, complete captcha, and claim your sats!</p>

      <input type="text" placeholder="cat@discoverlightning.org" id="linkInput" />
      <button id="giftBtn" style="display:none;">Spin Wheel</button>

      <div id="captcha"></div>

      <div id="giftAnimation" style="font-size: 3rem; height: 60px;"></div>
      <div class="gift" id="giftResult"></div>
    </div>

    <div id="wheelContainer">
      <div id="wheelPointer">▼</div>
      <div style="position: relative;">
        <canvas id="wheelCanvas" width="400" height="400"></canvas>
        <canvas id="textCanvas" width="400" height="400"
          style="position:absolute; top:0; left:0; pointer-events:none;"></canvas>
      </div>
    </div>
  </div>

  <script src="https://js.hcaptcha.com/1/api.js?onload=hcaptchaOnLoad" async defer></script>

  <script>
    const giftBtn = document.getElementById("giftBtn");
    const giftResult = document.getElementById("giftResult");
    const wheelCanvas = document.getElementById("wheelCanvas");
    const wheelContainer = document.getElementById("wheelContainer");
    const ctx = wheelCanvas.getContext("2d");

    const SLICES = 50;
    const SLICE_ANGLE_DEG = 360 / SLICES;
    const CENTER_X = 200;
    const CENTER_Y = 200;
    const RADIUS = 200;

    function drawWheel() {
      const angle = (2 * Math.PI) / SLICES;
      ctx.clearRect(0, 0, wheelCanvas.width, wheelCanvas.height);
      ctx.save();
      ctx.translate(CENTER_X, CENTER_Y);

      // IMPORTANT: center slice 1 at the top (under the pointer)
      for (let i = 0; i < SLICES; i++) {
        const start = (i - 0.5) * angle - Math.PI / 2;
        const end   = (i + 0.5) * angle - Math.PI / 2;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, RADIUS, start, end);
        ctx.fillStyle = i % 2 === 0 ? "#1e90ff" : "#0057b8";
        ctx.fill();

        const mid = (start + end) / 2;
        ctx.save();
        ctx.rotate(mid);
        ctx.textAlign = "right";
        ctx.fillStyle = "#000";
        ctx.font = "bold 18px Arial";

        const labelNumber = ((SLICES - i) % SLICES) + 1;
        ctx.fillText(labelNumber, RADIUS - 20, 5);

        ctx.restore();
      }


      ctx.restore();

      // MOON text (upright, centered)
      const textCanvas = document.getElementById("textCanvas");
      const textCtx = textCanvas.getContext("2d");
      textCtx.clearRect(0, 0, textCanvas.width, textCanvas.height);
      textCtx.save();
      textCtx.translate(textCanvas.width / 2, textCanvas.height / 2);
      textCtx.textAlign = "center";
      textCtx.textBaseline = "middle";
      textCtx.fillStyle = "#fff";
      textCtx.font = "bold 48px Arial";
      textCtx.shadowColor = "#ffcc00";
      textCtx.shadowBlur = 20;
      textCtx.fillText("MOON", 0, 0);
      textCtx.restore();
    }

    drawWheel();

    function onCaptchaSuccess() {
      document.getElementById("captcha").style.display = "none";
      giftBtn.style.display = "inline-block";
      wheelContainer.style.display = "block";
    }

    window.hcaptchaOnLoad = function () {
      hcaptcha.render("captcha", {
        sitekey: "a7725132-7912-4624-a0fe-e614b40c1a7e",
        callback: onCaptchaSuccess
      });
    };

    giftBtn.onclick = async () => {
      const giftAnimation = document.getElementById("giftAnimation");
      const address = document.getElementById("linkInput").value.trim();

      if (!address.includes("@")) {
        giftResult.textContent = "⚠️ Invalid Lightning address.";
        return;
      }

      const [name, domain] = address.split("@");

      try {
        const verifyUrl = `https://ln-verify.shadowlegendcg.workers.dev?name=${name}&domain=${domain}`;
        const check = await fetch(verifyUrl).then(r => r.json());
        if (!check.valid) {
          giftResult.textContent = "⚠️ Lightning address not found.";
          return;
        }
      } catch {
        giftResult.textContent = "⚠️ Could not verify Lightning address.";
        return;
      }

      giftResult.textContent = "";
      giftAnimation.innerHTML = "";

      // Pick winning slice index directly (0–49)
      const winningIndex = Math.floor(Math.random() * SLICES);

      // We want slice 0 centered at top at 0deg.
      // To land winningIndex under the pointer, rotate wheel so that
      // its center angle moves to the top.
      const extraSpins = 5 * 360;
      const stopAngle = extraSpins - winningIndex * SLICE_ANGLE_DEG;

      wheelCanvas.style.transform = `rotate(${stopAngle}deg)`;

      await new Promise(res => setTimeout(res, 10000));

      const resultNumber = ((SLICES - winningIndex - 1 + SLICES) % SLICES) + 1;


      giftAnimation.innerHTML = "";
      giftAnimation.style.animation = "";

      giftResult.innerHTML =
        `You landed on <b>${resultNumber}</b>.<br>
         You received <b>${resultNumber}</b> sats.`;

      giftResult.style.animation = "fadeIn 0.5s";
    };
  </script>

</body>
</html>
